<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ judul }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <div class="stamp">02</div>
        <div class="titles">
            <h1>{{ judul }}</h1>
            <p>Detail Tugas</p>
        </div>
    </div>
    <div class="container">
        <div class="panel">
            {% if task %}
                <table>
                    <tr><td class="mono">ID</td><td>{{ task.id }}</td></tr>
                    <tr><td class="mono">NAMA</td><td>{{ task.nama }}</td></tr>
                    <tr><td class="mono">DEADLINE</td><td class="deadline-cell">{{ task.deadline }}</td></tr>
                    <tr><td class="mono">PRIORITY</td><td>{{ task.priority }}</td></tr>
                    <tr><td class="mono">KATEGORI</td><td><span class="tag">{{ task.kategori }}</span></td></tr>
                    <tr><td class="mono">STATUS</td><td>{{ task.status }}</td></tr>
                </table>
            {% else %}
                <div class="empty-state">Belum ada tugas tercatat.</div>
            {% endif %}
        </div>
        <a href="{{ url_for('index') }}" class="back-link">← KEMBALI KE MENU</a>
    </div>
</body>
</html>
