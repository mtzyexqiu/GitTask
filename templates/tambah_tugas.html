<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Tugas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <div class="stamp">01</div>
        <div class="titles">
            <h1>Tambah Tugas</h1>
            <p>Entri Baru</p>
        </div>
    </div>
    <div class="container">
        <div class="panel">
            <form method="POST" id="formTugas">

                <div class="form-section">
                    <div class="form-section-title"><span class="step-dot">1</span> Nama Tugas</div>
                    <input type="text" name="nama" required placeholder="Contoh: Tugas Struktur Data">
                </div>

                <div class="form-section">
                    <div class="form-section-title"><span class="step-dot">2</span> Deadline</div>

                    <label>Tanggal Deadline</label>
                    <input type="date" id="tgl" required>
                    <div class="quick-row" id="quickDate">
                        <span class="quick-chip" data-days="0">Hari Ini</span>
                        <span class="quick-chip active" data-days="1">Besok</span>
                        <span class="quick-chip" data-days="3">3 Hari Lagi</span>
                        <span class="quick-chip" data-days="7">Minggu Depan</span>
                    </div>

                    <label>Jam Deadline</label>
                    <div class="quick-row" id="quickTime">
                        <span class="quick-chip" data-h="8" data-m="0" data-p="AM">08:00</span>
                        <span class="quick-chip" data-h="12" data-m="0" data-p="PM">12:00</span>
                        <span class="quick-chip" data-h="5" data-m="0" data-p="PM">17:00</span>
                        <span class="quick-chip active" data-h="11" data-m="59" data-p="PM">23:59</span>
                    </div>

                    <div class="clock-widget">
                        <div class="clock-display">
                            <span class="time-text"><span id="dispHour">11</span>:<span id="dispMin">59</span></span>
                            <div class="ampm-toggle">
                                <button type="button" class="ampm-btn active" data-period="PM">PM</button>
                                <button type="button" class="ampm-btn" data-period="AM">AM</button>
                            </div>
                        </div>

                        <div class="clock-tabs">
                            <button type="button" class="clock-tab active" data-mode="hour">Jam</button>
                            <button type="button" class="clock-tab" data-mode="minute">Menit</button>
                        </div>

                        <svg id="clockFace" viewBox="0 0 220 220" width="220" height="220">
                            <circle cx="110" cy="110" r="105" class="clock-circle"></circle>
                            <line id="clockHand" x1="110" y1="110" x2="110" y2="40" class="clock-hand"></line>
                            <circle id="clockKnob" cx="110" cy="40" r="13" class="clock-knob"></circle>
                            <circle cx="110" cy="110" r="4" class="clock-center"></circle>
                            <g id="clockNumbers"></g>
                        </svg>
                    </div>

                    <input type="hidden" name="deadline" id="deadline">
                </div>

                <div class="form-section">
                    <div class="form-section-title"><span class="step-dot">3</span> Tingkat Urgensi</div>
                    <div class="priority-grid">
                        <input type="radio" name="priority" value="1" id="p1">
                        <label for="p1" class="priority-pill p1">
                            <span class="pnum">P1</span><span class="plabel">Kritis</span>
                        </label>

                        <input type="radio" name="priority" value="2" id="p2">
                        <label for="p2" class="priority-pill p2">
                            <span class="pnum">P2</span><span class="plabel">Tinggi</span>
                        </label>

                        <input type="radio" name="priority" value="3" id="p3" checked>
                        <label for="p3" class="priority-pill p3">
                            <span class="pnum">P3</span><span class="plabel">Sedang</span>
                        </label>

                        <input type="radio" name="priority" value="4" id="p4">
                        <label for="p4" class="priority-pill p4">
                            <span class="pnum">P4</span><span class="plabel">Rendah</span>
                        </label>

                        <input type="radio" name="priority" value="5" id="p5">
                        <label for="p5" class="priority-pill p5">
                            <span class="pnum">P5</span><span class="plabel">Santai</span>
                        </label>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title"><span class="step-dot">4</span> Kategori</div>
                    <div class="category-grid">
                        <input type="radio" name="kategori" value="Kuliah" id="kKuliah" checked>
                        <label for="kKuliah" class="category-pill">
                            <span class="cicon">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 3 1 8l11 5 9-4.09V17h2V8z"></path>
                                    <path d="M5 13.18v4L12 21l7-3.82v-4"></path>
                                </svg>
                            </span>
                            <span class="clabel">Kuliah</span>
                        </label>

                        <input type="radio" name="kategori" value="Kerja" id="kKerja">
                        <label for="kKerja" class="category-pill">
                            <span class="cicon">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                                </svg>
                            </span>
                            <span class="clabel">Kerja</span>
                        </label>

                        <input type="radio" name="kategori" value="Pribadi" id="kPribadi">
                        <label for="kPribadi" class="category-pill">
                            <span class="cicon">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 9.5 12 3l9 6.5"></path>
                                    <path d="M5 10v10h14V10"></path>
                                </svg>
                            </span>
                            <span class="clabel">Pribadi</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Simpan Tugas</button>
            </form>
        </div>
        <a href="{{ url_for('index') }}" class="back-link">← KEMBALI KE MENU</a>
    </div>

    <script>
        // ===== TANGGAL =====
        const tglInput = document.getElementById('tgl');
        const d0 = new Date();
        d0.setDate(d0.getDate() + 1); // default: besok
        tglInput.value = d0.toISOString().split('T')[0];

        document.querySelectorAll('#quickDate .quick-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('#quickDate .quick-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                const days = parseInt(chip.dataset.days);
                const d = new Date();
                d.setDate(d.getDate() + days);
                tglInput.value = d.toISOString().split('T')[0];
            });
        });

        // ===== CLOCK STATE =====
        let selHour = 11, selMinute = 59, period = 'PM', mode = 'hour';
        let dragging = false;

        const svg = document.getElementById('clockFace');
        const hand = document.getElementById('clockHand');
        const knob = document.getElementById('clockKnob');
        const numsGroup = document.getElementById('clockNumbers');
        const dispHour = document.getElementById('dispHour');
        const dispMin = document.getElementById('dispMin');

        function polar(r, angleDeg) {
            const rad = angleDeg * Math.PI / 180;
            return { x: 110 + r * Math.sin(rad), y: 110 - r * Math.cos(rad) };
        }

        function currentIndex() {
            if (mode === 'hour') return selHour === 12 ? 0 : selHour;
            return selMinute / 5;
        }

        function redraw() {
            const angle = currentIndex() * 30;
            const tip = polar(75, angle);
            hand.setAttribute('x2', tip.x);
            hand.setAttribute('y2', tip.y);
            knob.setAttribute('cx', tip.x);
            knob.setAttribute('cy', tip.y);

            numsGroup.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const pos = polar(82, i * 30);
                const label = mode === 'hour' ? (i === 0 ? 12 : i) : (i === 0 ? '00' : String(i * 5).padStart(2, '0'));
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y);
                text.setAttribute('class', 'clock-num');
                text.textContent = label;
                text.addEventListener('click', () => {
                    setIndex(i);
                    if (mode === 'hour') { mode = 'minute'; updateTabs(); }
                    else { redraw(); }
                });
                numsGroup.appendChild(text);
            }

            dispHour.textContent = String(selHour).padStart(2, '0');
            dispMin.textContent = String(selMinute).padStart(2, '0');
        }

        function setIndex(i) {
            if (mode === 'hour') selHour = (i === 0) ? 12 : i;
            else selMinute = i * 5;
        }

        function angleFromPointer(evt) {
            const rect = svg.getBoundingClientRect();
            const scale = 220 / rect.width;
            const px = (evt.clientX - rect.left) * scale;
            const py = (evt.clientY - rect.top) * scale;
            let angle = Math.atan2(px - 110, -(py - 110)) * 180 / Math.PI;
            if (angle < 0) angle += 360;
            return angle;
        }

        function handleDrag(evt) {
            const angle = angleFromPointer(evt);
            const idx = Math.round(angle / 30) % 12;
            setIndex(idx);
            redraw();
        }

        svg.addEventListener('pointerdown', (e) => {
            dragging = true;
            svg.setPointerCapture(e.pointerId);
            handleDrag(e);
        });

        svg.addEventListener('pointermove', (e) => {
            if (dragging) handleDrag(e);
        });

        svg.addEventListener('pointerup', (e) => {
            if (dragging && mode === 'hour') { mode = 'minute'; updateTabs(); }
            dragging = false;
            svg.releasePointerCapture(e.pointerId);
        });

        svg.addEventListener('pointercancel', () => { dragging = false; });

        function updateTabs() {
            document.querySelectorAll('.clock-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
            redraw();
        }

        document.querySelectorAll('.clock-tab').forEach(tab => {
            tab.addEventListener('click', () => { mode = tab.dataset.mode; updateTabs(); });
        });

        document.querySelectorAll('.ampm-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                period = btn.dataset.period;
                document.querySelectorAll('.ampm-btn').forEach(b => b.classList.toggle('active', b === btn));
            });
        });

        document.querySelectorAll('#quickTime .quick-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('#quickTime .quick-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selHour = parseInt(chip.dataset.h);
                selMinute = parseInt(chip.dataset.m);
                period = chip.dataset.p;
                document.querySelectorAll('.ampm-btn').forEach(b => b.classList.toggle('active', b.dataset.period === period));
                mode = 'hour';
                updateTabs();
            });
        });

        redraw();

        // ===== SUBMIT =====
        document.getElementById('formTugas').addEventListener('submit', function () {
            let h24 = selHour % 12;
            if (period === 'PM') h24 += 12;
            const jamFinal = String(h24).padStart(2, '0') + ':' + String(selMinute).padStart(2, '0');
            document.getElementById('deadline').value = `${tglInput.value} ${jamFinal}`;
        });
    </script>
</body>
</html>
